name: Links

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-links:
    name: Check Links
    runs-on: ubuntu-latest
    env:
      BUNDLE_JOBS: 3
    steps:
      - name: Clone repository
        uses: actions/checkout@v7.0.1

      - name: Install Ruby
        uses: ruby/setup-ruby@v1.319.0
        with:
          bundler-cache: true

      - name: Install Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: '.tool-versions'
          cache: yarn

      - name: Install JS Deps
        run: yarn install --frozen-lockfile

      - name: Compile site
        run: bundle exec rake compile

      - name: Check links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          # Offline check of the compiled output: validate every internal link
          # against the generated files (no network, no external-host flakiness).
          # --root-dir resolves root-relative links (/articles/...). The remap
          # resolves absolute support.dnsimple.com links to local files too.
          # \$1 must stay escaped: the action evals args, and a bare $1 would be
          # eaten by the shell, silently disabling the remap (false green).
          args: '--offline --root-dir ${{ github.workspace }}/output --remap "https://support\.dnsimple\.com/?(.*) file://${{ github.workspace }}/output/\$1" output'
          fail: true
