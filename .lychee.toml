# Remap absolute support site URLs to relative paths for local file checking.
# This lets lychee verify internal links against the compiled output
# instead of hitting the live site.
remap = [
    "https://support\\.dnsimple\\.com(.*) $1"
]

exclude_mail = true

# Hosted status page (Statuspage-style) that throttles/blocks CI runner IPs,
# causing lychee to time out. Reachable in a browser; safe to skip in CI.
exclude = ["https://dnsimplestatus\\.com"]

max_concurrency = 5
max_retries = 3
timeout = 30
